<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>junk97543's gallery</title>
  <link id="favicon" rel="icon" type="image/png" href="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light">
  <header>
    <div class="brand">
      <img id="top-logo" class="top-logo" src="" alt="logo" />
      <h1>junk97543's gallery</h1>
    </div>

    <label for="file-input" class="upload-btn">Upload Photos & Videos</label>
    <input id="file-input" type="file" accept="image/*,video/*" multiple />
    <button id="login-btn" class="login-btn">Login (Admin)</button>
    <button id="chat-toggle-btn" class="chat-toggle-btn">💬 Chat</button>
    <button id="theme-toggle" class="theme-toggle">🌙 Dark Mode</button>
    <button id="delete-all-btn" class="delete-btn" style="display:none;">Delete All</button>
    <button id="back-to-top" class="back-to-top-btn" style="display:none;">↑ Top</button>
  </header>

  <div class="sort-buttons">
    <button id="sort-newest" class="sort-btn">🕐 Newest</button>
    <button id="sort-random" class="sort-btn active">🔀 Random</button>
    <button id="sort-popular" class="sort-btn">❤️ Most Liked</button>
  </div>

  <main id="gallery" class="masonry"></main>

  <section id="chat-section" class="chat-section" style="display:none;">
    <h2>Live Chat</h2>
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input">
      <input id="chat-name" type="text" placeholder="Your name" />
      <input id="chat-message" type="text" placeholder="Type a message..." />
      <button id="send-chat">Send</button>
    </div>
    <button id="chat-close-btn" class="chat-close-btn">Close Chat</button>
  </section>

  <div id="lightbox" class="lightbox">
    <button id="lightbox-close" class="lightbox-close" title="Close (Esc)">✕</button>
    <div class="lightbox-content">
      <img id="lightbox-img" alt="" />
      <video id="lightbox-video" controls></video>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
